<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elizabeth Orr | Engineer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=Raleway:wght@200;300;400;600;700;800;900&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Raleway', sans-serif;
            background: #faf8f5;
            color: #3d3d3d;
            overflow-x: hidden;
        }

        /* ============ NAV ============ */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 22px 50px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 200;
            background: rgba(250, 248, 245, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(196, 139, 159, 0.12);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 700;
            color: #5c3d4e;
            letter-spacing: 2px;
            border: 2px solid #5c3d4e;
            padding: 5px 10px;
            line-height: 1;
        }

        .nav-links {
            display: flex;
            gap: 35px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #5c3d4e;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: color 0.3s;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: #c48b9f;
            transition: width 0.3s;
        }

        .nav-links a:hover { color: #c48b9f; }
        .nav-links a:hover::after { width: 100%; }

        /* ============ HERO ============ */
        .hero {
            min-height: 100vh;
            padding: 100px 50px 40px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        /* ============ HELLO TEXT ============ */
        .hello-line {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: clamp(2rem, 4vw, 3.5rem);
            text-transform: uppercase;
            color: #2d1f26;
            letter-spacing: 3px;
            margin-top: 20px;
            line-height: 1.1;
            position: relative;
            z-index: 2;
        }

        /* ============ MASSIVE NAME ============ */
        .name-block {
            position: relative;
            margin: -5px 0 0 -8px;
            z-index: 1;
        }

        .name-row {
            display: flex;
            align-items: baseline;
            line-height: 0.85;
        }

        .letter {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: clamp(6rem, 15vw, 16rem);
            text-transform: uppercase;
            display: inline-block;
            position: relative;
            letter-spacing: -4px;
            transition: transform 0.3s ease;
            cursor: default;
        }

        .letter:hover {
            transform: translateY(-6px);
        }

        /* --- Letter Styles --- */
        .l-dark {
            color: #2d1f26;
        }

        .l-pink-solid {
            color: #c48b9f;
        }

        .l-pink-light {
            color: #dba8b8;
        }

        .l-outline-dark {
            -webkit-text-stroke: 3px #2d1f26;
            color: transparent;
        }

        .l-outline-pink {
            -webkit-text-stroke: 3px #c48b9f;
            color: transparent;
        }

        .l-gradient {
            background: linear-gradient(180deg, #c48b9f 0%, #e8b4c8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .l-dark-shadow {
            color: #2d1f26;
            text-shadow: 6px 6px 0 rgba(196, 139, 159, 0.2);
        }

        .l-serif {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-style: italic;
        }

        /* ============ PINK ACCENTS / DECORATIONS ============ */

        /* Large pink circle behind letters */
        .pink-circle-lg {
            position: absolute;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(196, 139, 159, 0.12) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        .pink-circle-lg.pc1 {
            top: 5%;
            left: 25%;
        }

        .pink-circle-lg.pc2 {
            top: 30%;
            right: 30%;
            width: 120px;
            height: 120px;
        }

        /* Small pink dots */
        .pink-dot {
            position: absolute;
            border-radius: 50%;
            background: #c48b9f;
            z-index: 3;
            pointer-events: none;
        }

        .pd1 { width: 14px; height: 14px; top: 8%; left: 52%; opacity: 0.7; }
        .pd2 { width: 8px; height: 8px; top: 42%; left: 65%; opacity: 0.5; }
        .pd3 { width: 20px; height: 20px; top: 2%; right: 22%; opacity: 0.15; }
        .pd4 { width: 6px; height: 6px; top: 55%; left: 40%; opacity: 0.6; }
        .pd5 { width: 10px; height: 10px; top: 18%; right: 15%; opacity: 0.4; }
        .pd6 { width: 16px; height: 16px; bottom: 58%; left: 72%; opacity: 0.2; }
        .pd7 { width: 5px; height: 5px; top: 35%; left: 15%; opacity: 0.5; background: #d4a373; }

        /* Pink diagonal slash marks */
        .pink-slash {
            position: absolute;
            width: 3px;
            height: 40px;
            background: linear-gradient(180deg, #c48b9f, transparent);
            transform: rotate(-30deg);
            z-index: 3;
            pointer-events: none;
            opacity: 0.3;
        }

        .ps1 { top: 5%; left: 48%; }
        .ps2 { top: 15%; right: 18%; height: 25px; transform: rotate(-45deg); opacity: 0.2; }
        .ps3 { top: 45%; left: 58%; height: 30px; transform: rotate(-20deg); opacity: 0.25; }

        /* Pink ring outlines */
        .pink-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(196, 139, 159, 0.12);
            z-index: 0;
            pointer-events: none;
        }

        .pr1 { width: 100px; height: 100px; top: 0; right: 10%; }
        .pr2 { width: 60px; height: 60px; top: 40%; right: 25%; border-color: rgba(212, 163, 115, 0.1); }

        /* Pink paint splash (abstract shape) */
        .pink-splash {
            position: absolute;
            width: 80px;
            height: 30px;
            background: rgba(196, 139, 159, 0.08);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            transform: rotate(-12deg);
            z-index: 0;
            pointer-events: none;
        }

        .pspl1 { top: 22%; left: 60%; }
        .pspl2 { top: 50%; left: 30%; width: 60px; height: 20px; transform: rotate(8deg); }

        /* Small "+" marks */
        .plus-mark {
            position: absolute;
            font-size: 1rem;
            color: rgba(196, 139, 159, 0.2);
            font-weight: 300;
            z-index: 3;
            pointer-events: none;
        }

        .pm1 { top: 3%; right: 30%; }
        .pm2 { top: 48%; right: 12%; color: rgba(212, 163, 115, 0.2); }

        /* Decorative bar */
        .deco-bar {
            display: inline-block;
            width: 70px;
            height: 9px;
            background: linear-gradient(90deg, #c48b9f, #e8b4c8);
            border-radius: 5px;
            margin-left: 10px;
            margin-bottom: clamp(15px, 3vw, 35px);
