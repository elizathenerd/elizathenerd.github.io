<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elizabeth Orr | Engineer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,400;1,900&family=Raleway:wght@300;400;600;700;900&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Raleway', sans-serif;
            background: linear-gradient(160deg, #1e0d25 0%, #150820 40%, #0d0415 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            color: #e8d8e0;
        }

        /* ===== NAME ===== */
        .site-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 400;
            color: rgba(196, 139, 159, 0.8);
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-top: 30px;
            text-align: center;
        }

        /* ===== POKEBALL SECTION ===== */
        .pokeball-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5px 0 0;
        }

        .click-hint {
            font-size: 0.65rem;
            color: rgba(196, 139, 159, 0.4);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 8px;
            animation: hintPulse 2.5s ease-in-out infinite;
            transition: opacity 0.5s;
        }

        @keyframes hintPulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.7; }
        }

        .pokeball-container.opened .click-hint {
            opacity: 0;
            pointer-events: none;
        }

        /* ===== POKEBALL CONTAINER ===== */
        .pokeball-container {
            position: relative;
            width: 520px;
            height: 620px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== POKEBALL WRAPPER ===== */
        .pokeball-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            animation: ballFloat 3.5s ease-in-out infinite;
        }

        @keyframes ballFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .pokeball-container.opened .pokeball-wrapper {
            animation: none;
        }

        /* Ambient glow behind ball */
        .pokeball-wrapper::before {
            content: '';
            position: absolute;
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, rgba(240, 160, 184, 0.08) 0%, transparent 60%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            border-radius: 50%;
        }

        /* ===== TOP GROUP (lid + ears) ===== */
        .top-group {
            position: absolute;
            width: 300px;
            height: 150px;
            top: 0;
            left: 0;
            z-index: 3;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: transform;
        }

        .pokeball-container.opened .top-group {
            transform: translateY(-100px) rotateZ(-8deg);
        }

        /* ===== BUNNY EARS ===== */
        .ear {
            position: absolute;
            z-index: 5;
            top: -60px;
        }

        .ear-left {
            left: 52px;
            transform: rotate(-12deg);
        }

        .ear-right {
            right: 52px;
            transform: rotate(12deg);
        }

        .ear-outer {
            width: 42px;
            height: 85px;
            background: linear-gradient(180deg, #f7c0d0 0%, #f0a0b8 50%, #e898b0 100%);
            border-radius: 50% 50% 40% 40% / 65% 65% 35% 35%;
            position: relative;
            box-shadow:
                inset 3px 0 8px rgba(255,255,255,0.12),
                inset -3px 0 8px rgba(0,0,0,0.06),
                2px 4px 10px rgba(0,0,0,0.15);
        }

        /* Ear shine */
        .ear-outer::before {
            content: '';
            position: absolute;
            width: 12px;
            height: 35px;
            background: radial-gradient(ellipse, rgba(255,255,255,0.2) 0%, transparent 70%);
            top: 12px;
            left: 8px;
            border-radius: 50%;
            transform: rotate(-5deg);
        }

        .ear-inner {
            position: absolute;
            width: 24px;
            height: 52px;
            background: linear-gradient(180deg, #3a2a30 0%, #2a2a2e 40%, #222 100%);
            border-radius: 50% 50% 45% 45% / 65% 65% 35% 35%;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.3);
        }

        /* Ear inner shine */
        .ear-inner::before {
            content: '';
            position: absolute;
            width: 8px;
            height: 18px;
            background: radial-gradient(ellipse, rgba(255,255,255,0.06) 0%, transparent 70%);
            top: 8px;
            left: 5px;
            border-radius: 50%;
        }

        /* ===== POKEBALL TOP HALF ===== */
        .pokeball-top {
            width: 300px;
            height: 150px;
            background: linear-gradient(175deg, #f7c8d8 0%, #f2b0c2 30%, #f0a0b8 55%, #e898b0 80%, #e090a8 100%);
            border-radius: 150px 150px 0 0;
            position: relative;
            overflow: hidden;
            box-shadow:
                inset 0 20px 40px rgba(255,255,255,0.18),
                inset 0 -4px 10px rgba(0,0,0,0.06),
                inset 15px 0 30px rgba(255,255,255,0.06),
                inset -15px 0 20px rgba(0,0,0,0.04),
                0 -4px 20px rgba(240, 160, 184, 0.15);
        }

        /* Main shine highlight */
        .pokeball-top::before {
            content: '';
            position: absolute;
            width: 120px;
            height: 65px;
            background: radial-gradient(ellipse, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0.08) 40%, transparent 70%);
            top: 12px;
            left: 22%;
            transform: rotate(-12deg);
            border-radius: 50%;
        }

        /* Edge darkening for 3D curve */
        .pokeball-top::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 0% 50%, rgba(0,0,0,0.08) 0%, transparent 40%),
                radial-gradient(ellipse at 100% 50%, rgba(0,0,0,0.06) 0%, transparent 35%),
                radial-gradient(ellipse at 50% 100%, rgba(0,0,0,0.05) 0%, transparent 30%);
            top: 0;
            left: 0;
        }

        /* ===== POKEBALL BOTTOM HALF ===== */
        .pokeball-bottom {
            position: absolute;
            width: 300px;
            height: 150px;
            background: linear-gradient(5deg, #d4d0cc 0%, #e6e2de 20%, #efecea 45%, #f5f3f1 70%, #f0edeb 100%);
            border-radius: 0 0 150px 150px;
            bottom: 0;
            left: 0;
            z-index: 2;
            box-shadow:
                inset 0 -15px 30px rgba(0,0,0,0.06),
                inset 0 8px 15px rgba(255,255,255,0.3),
                inset 12px 0 20px rgba(255,255,255,0.08),
                inset -12px 0 15px rgba(0,0,0,0.03),
                0 8px 25px rgba(0,0,0,0.2);
        }

        /* Bottom shine */
        .pokeball-bottom::before {
            content: '';
            position: absolute;
            width: 100px;
            height: 40px;
            background: radial-gradient(ellipse, rgba(255,255,255,0.35) 0%, transparent 70%);
            top: 12px;
            left: 25%;
            border-radius: 50%;
            transform: rotate(-5deg);
        }

        /* Bottom edge curves */
        .pokeball-bottom::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 0% 50%, rgba(0,0,0,0.06) 0%, transparent 35%),
                radial-gradient(ellipse at 100% 50%, rgba(0,0,0,0.05) 0%, transparent 30%);
            top: 0;
            left: 0;
        }

        /* ===== BAND ===== */
        .pokeball-band {
            position: absolute;
            width: 314px;
            height: 24px;
            background: linear-gradient(180deg, #222226 0%, #2e2e32 40%, #262628 60%, #1e1e22 100%);
            top: 50%;
            left: -7px;
            transform: translateY(-50%);
            z-index: 5;
            border-radius: 3px;
            box-shadow:
                0 3px 8px rgba(0,0,0,0.35),
                0 -1px 3px rgba(0,0,0,0.15),
                inset 0 1px 1px rgba(255,255,255,0.06);
        }

        /* Band top edge */
        .pokeball-band::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 1px;
            background: rgba(255,255,255,0.08);
            top: 1px;
        }

        /* Band bottom edge */
        .pokeball-band::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 1px;
            background: rgba(255,255,255,0.04);
            bottom: 1px;
        }

        /* ===== CENTER BUTTON ===== */
        .pokeball-button {
            position: absolute;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: radial-gradient(circle at 42% 38%, #2e2e32, #1e1e22 60%, #161618);
            border: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            cursor: pointer;
            transition: box-shadow 0.3s, transform 0.3s;
            box-shadow:
                0 3px 10px rgba(0,0,0,0.4),
                0 0 0 2px rgba(50,50,54,0.5);
        }

        /* White ring */
        .pokeball-button::before {
            content: '';
            position: absolute;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: radial-gradient(circle at 38% 32%, #ffffff, #f0f0f0 50%, #ddd 80%, #ccc);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow:
                inset 0 -3px 6px rgba(0,0,0,0.08),
                inset 0 2px 3px rgba(255,255,255,0.6),
                0 1px 3px rgba(0,0,0,0.15);
        }

        /* Teal center */
        .pokeball-button::after {
            content: '';
            position: absolute;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: radial-gradient(circle at 36% 30%, #6eeee6, #45d4ce 35%, #30c0ba 60%, #1ea8a2 85%, #189490);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow:
                0 0 10px rgba(60, 200, 194, 0.4),
                0 0 25px rgba(60, 200, 194, 0.15),
                inset 0 -3px 4px rgba(0,0,0,0.18),
                inset 0 2px 3px rgba(255,255,255,0.2);
        }

        .pokeball-button:hover {
            box-shadow:
                0 0 22px rgba(60, 200, 194, 0.5),
                0 0 45px rgba(240, 160, 184, 0.2),
                0 0 0 2px rgba(50,50,54,0.5);
            transform: translate(-50%, -50%) scale(1.08);
        }

        .pokeball-button:hover::after {
            box-shadow:
                0 0 16px rgba(60, 200, 194, 0.6),
                0 0 35px rgba(60, 200, 194, 0.3),
                inset 0 -3px 4px rgba(0,0,0,0.18),
                inset 0 2px 3px rgba(255,255,255,0.2);
        }

        /* ===== FLOOR REFLECTION ===== */
        .pokeball-reflection {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%) scaleY(-1);
            width: 300px;
            height: 80px;
            background: linear-gradient(to bottom,
                rgba(240, 160, 184, 0.06) 0%,
                rgba(240, 160, 184, 0.02) 40%,
                transparent 100%);
            border-radius: 0 0 150px 150px;
            filter: blur(4px);
            z-index: 0;
            pointer-events: none;
        }

        /* ===== SHADOW UNDER BALL ===== */
        .pokeball-shadow {
            position: absolute;
            bottom: 65px;
            left: 50%;
            transform: translateX(-50%);
            width: 220px;
            height: 20px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.25) 0%, rgba(240, 160, 184, 0.08) 40%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }

        /* ===== INNER GLOW ===== */
        .pokeball-glow {
            position: absolute;
            width: 220px;
            height: 110px;
            background: radial-gradient(ellipse at center, rgba(92, 224, 214, 0.45) 0%, rgba(240, 160, 184, 0.25) 40%, transparent 70%);
            top: 22%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            opacity: 0;
            transition: opacity 0.5s ease 0.2s;
            filter: blur(10px);
            pointer-events: none;
        }

        .pokeball-container.opened .pokeball-glow {
            opacity: 1;
        }

        /* ===== RAYS CONTAINER ===== */
        .rays-container {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            z-index: 15;
            pointer-events: none;
        }

        /* ===== INDIVIDUAL RAY ===== */
        .ray {
            position: absolute;
            bottom: 0;
            left: -1.5px;
            width: 3px;
            height: 0;
            transform-origin: bottom center;
            opacity: 0;
            transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
            will-change: height;
        }

        .ray-line {
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(92, 224, 214, 0.6), rgba(255, 210, 225, 0.5), transparent);
            border-radius: 2px;
            box-shadow: 0 0 12px rgba(92, 224, 214, 0.2);
        }

        /* ===== RAY BUBBLE ===== */
        .ray-bubble {
            position: absolute;
            top: -48px;
            left: 50%;
            width: 82px;
            height: 82px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            text-decoration: none;
            pointer-events: auto;
            cursor: pointer;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #fff;
            line-height: 1.3;
            background: radial-gradient(circle at 35% 28%, #f7c5d5, #e090a8 60%, #d67a98);
            box-shadow:
                0 0 20px rgba(244, 160, 181, 0.45),
                0 4px 14px rgba(0,0,0,0.2),
                inset 0 2px 4px rgba(255,255,255,0.2);
            text-shadow: 0 1px 2px rgba(0,0,0,0.15);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s;
            will-change: transform;
        }

        /* ===== RAY ROTATIONS ===== */
        .ray-1 { transform: rotate(-60deg); }
        .ray-2 { transform: rotate(-30deg); }
        .ray-3 { transform: rotate(0deg); }
        .ray-4 { transform: rotate(30deg); }
        .ray-5 { transform: rotate(60deg); }

        .ray-1 .ray-bubble { transform: translateX(-50%) rotate(60deg) scale(0); }
        .ray-2 .ray-bubble { transform: translateX(-50%) rotate(30deg) scale(0); }
        .ray-3 .ray-bubble { transform: translateX(-50%) rotate(0deg) scale(0); }
        .ray-4 .ray-bubble { transform: translateX(-50%) rotate(-30deg) scale(0); }
        .ray-5 .ray-bubble { transform: translateX(-50%) rotate(-60deg) scale(0); }

        /* ===== OPENED — RAYS ===== */
        .pokeball-container.opened .ray {
            opacity: 1;
            height: 170px;
        }

        .pokeball-container.opened .ray-1 { transition-delay: 0.3s; }
        .pokeball-container.opened .ray-2 { transition-delay: 0.4s; }
        .pokeball-container.opened .ray-3 { transition-delay: 0.35s; }
        .pokeball-container.opened .ray-4 { transition-delay: 0.45s; }
        .pokeball-container.opened .ray-5 { transition-delay: 0.5s; }

        /* ===== OPENED — BUBBLES ===== */
        .pokeball-container.opened .ray-1 .ray-bubble {
            transform: translateX(-50%) rotate(60deg) scale(1);
            transition-delay: 0.6s;
        }
        .pokeball-container.opened .ray-2 .ray-bubble {
            transform: translateX(-50%) rotate(30deg) scale(1);
            transition-delay: 0.7s;
        }
        .pokeball-container.opened .ray-3 .ray-bubble {
            transform: translateX(-50%) rotate(0deg) scale(1);
            transition-delay: 0.65s;
        }
        .pokeball-container.opened .ray-4 .ray-bubble {
            transform: translateX(-50%) rotate(-30deg) scale(1);
            transition-delay: 0.75s;
        }
        .pokeball-container.opened .ray-5 .ray-bubble {
            transform: translateX(-50%) rotate(-60deg) scale(1);
            transition-delay: 0.8s;
        }

        /* ===== BUBBLE HOVER ===== */
        .pokeball-container.opened .ray-1 .ray-bubble:hover {
            transform: translateX(-50%) rotate(60deg) scale(1.15);
            box-shadow: 0 0 30px rgba(244, 160, 181, 0.7), 0 5px 18px rgba(0,0,0,0.25);
        }
        .pokeball-container.opened .ray-2 .ray-bubble:hover {
            transform: translateX(-50%) rotate(30deg) scale(1.15);
            box-shadow: 0 0 30px rgba(244, 160, 181, 0.7), 0 5px 18px rgba(0,0,0,0.25);
        }
        .pokeball-container.opened .ray-3 .ray-bubble:hover {
            transform: translateX(-50%) rotate(0deg) scale(1.15);
            box-shadow: 0 0 30px rgba(244, 160, 181, 0.7), 0 5px 18px rgba(0,0,0,0.25);
        }
        .pokeball-container.opened .ray-4 .ray-bubble:hover {
            transform: translateX(-50%) rotate(-30deg) scale(1.15);
            box-shadow: 0 0 30px rgba(244, 160, 181, 0.7), 0 5px 18px rgba(0,0,0,0.25);
        }
        .pokeball-container.opened .ray-5 .ray-bubble:hover {
            transform: translateX(-50%) rotate(-60deg) scale(1.15);
            box-shadow: 0 0 30px rgba(244, 160, 181, 0.7), 0 5px 18px rgba(0,0,0,0.25);
        }

        /* ===== SPARKLES ===== */
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #f4c5d5;
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
        }

        .pokeball-container.opened .sparkle {
            animation: sparkleAnim 1.2s ease forwards;
        }

        @keyframes sparkleAnim {
            0% { opacity: 0; transform: scale(0); }
            40% { opacity: 1; transform: scale(1.5); }
            100% { opacity: 0; transform: scale(0); }
        }

        .s1 { top: 20%; left: 10%; }
        .s2 { top: 10%; left: 50%; width: 3px; height: 3px; }
        .s3 { top: 16%; right: 13%; }
        .s4 { top: 30%; left: 5%; width: 5px; height: 5px; }
        .s5 { top: 7%; right: 26%; width: 3px; height: 3px; background: #5ce0d6; }
        .s6 { top: 26%; right: 7%; }
        .s7 { top: 13%; left: 28%; width: 3px; height: 3px; background: #e8b4c8; }
        .s8 { top: 23%; right: 32%; width: 4px; height: 4px; }
        .s9 { top: 18%; left: 42%; width: 3px; height: 3px; background: #5ce0d6; }

        .pokeball-container.opened .s1 { animation-delay: 0.4s; }
        .pokeball-container.opened .s2 { animation-delay: 0.55s; }
        .pokeball-container.opened .s3 { animation-delay: 0.5s; }
        .pokeball-container.opened .s4 { animation-delay: 0.65s; }
        .pokeball-container.opened .s5 { animation-delay: 0.45s; }
        .pokeball-container.opened .s6 { animation-delay: 0.6s; }
        .pokeball-container.opened .s7 { animation-delay: 0.7s; }
        .pokeball-container.opened .s8 { animation-delay: 0.5s; }
        .pokeball-container.opened .s9 { animation-delay: 0.58s; }

        /* ===== TEXT SECTION ===== */
        .text-section {
            text-align: center;
            padding: 5px 25px 10px;
            max-width: 580px;
        }

        .text-section h2 {
            font-family: 'Oswald', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #e0d0d8;
        }

        .text-section h2 span {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: #c48b9f;
            letter-spacing: 3px;
        }

        .text-section p {
            margin-top: 15px;
            font-size: 0.9rem;
            font-weight: 300;
            color: rgba(230, 210, 220, 0.5);
            line-height: 1.85;
        }

        /* ===== SOCIAL ICONS ===== */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 16px;
            padding: 25px 0 50px;
        }

        .social-icons a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 1.5px solid rgba(196, 139, 159, 0.25);
            color: rgba(196, 139, 159, 0.6);
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.3s;
        }

        .social-icons a:hover {
            background: #c48b9f;
            border-color: #c48b9f;
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 5px 14px rgba(196, 139, 159, 0.4);
        }

        /* ===== MOBILE ===== */
        @media (max-width: 560px) {
            .site-name {
                font-size: 1.1rem;
                letter-spacing: 6px;
                margin-top: 20px;
            }

            .pokeball-container {
                width: 360px;
                height: 500px;
            }

            .pokeball-wrapper {
                width: 220px;
                height: 220px;
            }

            .top-group {
                width: 220px;
                height: 110px;
            }

            .pokeball-top {
                width: 220px;
                height: 110px;
                border-radius: 110px 110px 0 0;
            }

            .pokeball-bottom {
                width: 220px;
                height: 110px;
                border-radius: 0 0 110px 110px;
            }

            .pokeball-band { width: 234px; left: -7px; height: 20px; }
            .pokeball-button { width: 52px; height: 52px; }
            .pokeball-button::before { width: 38px; height: 38px; }
            .pokeball-button::after { width: 20px; height: 20px; }

            .ear-left { left: 38px; }
            .ear-right { right: 38px; }
            .ear-outer { width: 34px; height: 68px; }
            .ear-inner { width: 18px; height: 40px; top: 12px; }

            .pokeball-container.opened .ray { height: 125px; }
            .pokeball-container.opened .top-group { transform: translateY(-75px) rotateZ(-8deg); }

            .ray-bubble {
                width: 64px;
                height: 64px;
                font-size: 0.5rem;
                top: -38px;
            }

            .text-section h2 { font-size: 1.6rem; letter-spacing: 4px; }
